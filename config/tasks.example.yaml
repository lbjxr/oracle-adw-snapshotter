defaults:
  target_schema: SNAPSHOT_ARCHIVE
  snapshot_table_prefix: SNAP_
  commit_every_job: true
  query_timeout_seconds: 1800

scheduler:
  enabled: true
  schedule_name: daily-random-50
  timezone: Asia/Shanghai
  runs_per_day: 50
  parameter_min: 10
  parameter_max: 100
  read_source_table: SNAPSHOT_JOB_RUNS
  read_limit: 3
  poll_interval_seconds: 30

jobs:
  - name: adw_orders_last_7d
    enabled: true
    mode: query
    source_sql: |
      SELECT order_id,
             customer_id,
             amount,
             status,
             created_at,
             updated_at
      FROM sales.orders
      WHERE updated_at >= SYSTIMESTAMP - INTERVAL '7' DAY
    target_table: SNAP_ORDERS_LAST_7D
    write_mode: append
    tags: [sales, adw, rolling-window]

  - name: adw_customers_active
    enabled: true
    mode: table
    source_table: crm.customers
    target_table: SNAP_CUSTOMERS_ACTIVE
    write_mode: append
    where_clause: "status = 'ACTIVE' AND NVL(deleted_flag, 'N') = 'N'"
    tags: [crm, adw, full]
